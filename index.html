<script>
    let db = {
        beans: JSON.parse(localStorage.getItem('coffee_beans') || '[]'),
        roasts: JSON.parse(localStorage.getItem('coffee_roasts') || '[]'),
        sales: JSON.parse(localStorage.getItem('coffee_sales') || '[]')
    };

    function showTab(name) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-content'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active-content');
        event.currentTarget.classList.add('active');
        refreshAll();
    }

    function toSec(m, s) { return (parseInt(m)||0)*60 + (parseInt(s)||0); }
    function fromSec(total) { 
        if(!total) return { m:0, s:0 };
        return { m: Math.floor(total/60), s: total%60 }; 
    }

    function saveAndRefresh(type) {
        localStorage.setItem('coffee_'+type, JSON.stringify(db[type]));
        refreshAll();
    }

    // 儲存邏輯保持不變... (省略中間 save 函數以節省空間)

    function refreshAll() {
        try {
            // 1. 更新生豆下拉
            const rBeanSelect = document.getElementById('r_beanSelect');
            if(rBeanSelect) {
                rBeanSelect.innerHTML = db.beans.length > 0 
                    ? db.beans.map(b => `<option value="${b.id}">${b.origin} ${b.estate}</option>`).join('')
                    : '<option value="">請先新增生豆</option>';
            }

            // 2. 更新烘焙下拉
            const sRoastSelect = document.getElementById('s_roastSelect');
            if(sRoastSelect) {
                sRoastSelect.innerHTML = db.roasts.length > 0
                    ? db.roasts.map(r => `<option value="${r.id}">[${r.batchNo}] ${r.beanTitle}</option>`).join('')
                    : '<option value="">請先新增烘焙紀錄</option>';
            }

            // 3. 渲染生豆清單
            const beanList = document.getElementById('beanList');
            if(beanList) {
                beanList.innerHTML = db.beans.map(b => `
                    <div class="item-card">
                        <div class="item-header" onclick="this.nextElementSibling.classList.toggle('active')">
                            <div class="batch-info"><b>${b.origin || '未命名'}</b><span>${b.estate || ''}</span></div>
                            <div>$${b.cost}/kg</div>
                        </div>
                        <div class="item-details">
                            <div class="action-btns">
                                <button class="btn-sm btn-edit" onclick="editBean(${b.id})">修改</button>
                                <button class="btn-sm btn-del" onclick="deleteItem('beans', ${b.id})">刪除</button>
                            </div>
                        </div>
                    </div>`).join('');
            }

            // 4. 渲染烘焙清單 (加強保護)
            const roastList = document.getElementById('roastList');
            if(roastList) {
                roastList.innerHTML = db.roasts.map(r => {
                    const tp = fromSec(r.tp ? r.tp[0] : 0);
                    const drop = fromSec(r.drop ? r.drop[0] : 0);
                    return `
                    <div class="item-card">
                        <div class="item-header" onclick="this.nextElementSibling.classList.toggle('active'); drawBatchChart(${r.id});">
                            <div class="batch-info"><b>#${r.batchNo || 'N/A'} ${r.beanTitle || ''}</b><span>${r.date || ''} | 失重 ${r.loss || 0}%</span></div>
                        </div>
                        <div class="item-details">
                            <div class="info-row"><span>入豆: ${r.chargeT || '--'}℃</span><span>下豆: ${r.drop ? r.drop[1] : '--'}℃ (${drop.m}:${drop.s})</span></div>
                            <div class="chart-container"><canvas id="chart-${r.id}"></canvas></div>
                            <div class="action-btns">
                                <button class="btn-sm btn-edit" onclick="editRoast(${r.id})">修改</button>
                                <button class="btn-sm btn-del" onclick="deleteItem('roasts', ${r.id})">刪除</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }

            // 5. 渲染出貨清單
            const salesList = document.getElementById('salesList');
            if(salesList) {
                salesList.innerHTML = db.sales.map(s => `
                    <div class="item-card">
                        <div class="item-header" onclick="this.nextElementSibling.classList.toggle('active')">
                            <div class="batch-info"><b>${s.buyer || '客戶'}</b><span>${s.beanTitle || ''} (${s.weight || 0}g)</span></div>
                            <div class="profit">+$${s.profit || 0}</div>
                        </div>
                        <div class="item-details">
                            <div class="info-row"><span>日期: ${s.date || ''}</span><span>售價: $${s.price || 0}</span></div>
                            <div class="action-btns">
                                <button class="btn-sm btn-edit" onclick="editSale(${s.id})">修改</button>
                                <button class="btn-sm btn-del" onclick="deleteItem('sales', ${s.id})">刪除</button>
                            </div>
                        </div>
                    </div>`).join('');
            }
        } catch (e) {
            console.error("渲染出錯:", e);
        }
    }
    
    // 初始化及其他函數...
    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        if(document.getElementById('r_date')) document.getElementById('r_date').value = today;
        if(document.getElementById('s_date')) document.getElementById('s_date').value = today;
        refreshAll();
    };
</script>
